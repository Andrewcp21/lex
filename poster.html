<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFFFF;
    font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
  }

  .poster {
    width: 800px;
    height: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #FFFFFF;
    gap: 16px;
  }

  h1 {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -0.025em;
    text-transform: uppercase;
    color: #0A0A0A;
    line-height: 1;
  }

  p {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #0A0A0A;
    opacity: 0.4;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="poster">
    <h1>Kosa Rupa</h1>
    <p>Kamus Arsitektur</p>
  </div>
</body>
</html>
