<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0A0A0A;
    font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif;
  }

  .poster {
    width: 800px;
    height: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0A0A0A;
    gap: 16px;
  }

  h1 {
    font-size: 96px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #F5F0E8;
    line-height: 1;
  }

  p {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #F5F0E8;
    opacity: 0.4;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="poster">
    <h1>Kosarupa</h1>
    <p>Kamus Arsitektur</p>
  </div>
</body>
</html>
